name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # RLS cross-user suite: tests/integration/db/rls.integration.test.ts is in vitest include.
      # Set repo secret SUPABASE_TEST_DATABASE_URL to run those cases in CI; otherwise describe.skipIf skips them.
      - name: Dependency audit
        run: npm run audit:deps

      - name: Run tests
        run: npm test
        env:
          SUPABASE_TEST_DATABASE_URL: ${{ secrets.SUPABASE_TEST_DATABASE_URL }}

      - name: Coverage report (70% gate — see docs/production-readiness/COVERAGE_ROADMAP.md)
        run: npm run test:coverage
        env:
          SUPABASE_TEST_DATABASE_URL: ${{ secrets.SUPABASE_TEST_DATABASE_URL }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build
        run: npm run build
