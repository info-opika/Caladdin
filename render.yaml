# Caladdin — Render Blueprint (pilot / production)
# Docs: docs/DEPLOYMENT.md
#
# 1. Push to GitHub and connect the repo in Render
# 2. New → Blueprint → select this file
# 3. Fill sync: false secrets in Dashboard (caladdin-core env group)
# 4. Set CALADDIN_BASE_URL + GOOGLE_REDIRECT_URI to your Render HTTPS URL
# 5. Apply Supabase migrations: npm run db:push (from your machine)

envVarGroups:
  - name: caladdin-core
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: MAX_PILOT_USERS
        value: "20"
      - key: CALADDIN_KILL_SWITCH
        value: "0"
      - key: CALADDIN_AGENT_ENABLED
        value: "1"
      - key: NTFY_TOPIC
        value: caladdin-agent
      - key: NTFY_USER_TOPIC
        value: caladdin-user
      - key: EMAIL_FROM
        value: Caladdin <onboarding@caladdin.app>
      # Set in Dashboard (sync: false) — never commit secrets
      - key: FREELLMAPI_BASE_URL
        value: https://freellmapiserver-production-df6f.up.railway.app/v1
      - key: CALADDIN_AGENT_MODEL
        value: auto:smart
      - key: FREELLMAPI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: CALADDIN_BASE_URL
        sync: false
      - key: CALADDIN_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: OAUTH_STATE_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      # Optional: Redis rate-limit backend (Postgres used when unset)
      - key: REDIS_URL
        sync: false

services:
  - type: web
    name: caladdin
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - fromGroup: caladdin-core
      - key: CALADDIN_SERVICE_NAME
        value: caladdin-web

  # Session expiry — every 15 minutes (durable trigger; web also runs in-process fallback)
  - type: cron
    name: caladdin-session-expiry
    runtime: node
    plan: starter
    region: oregon
    schedule: "*/15 * * * *"
    buildCommand: npm ci
    startCommand: >-
      node -e "fetch(process.env.CALADDIN_BASE_URL+'/jobs/session-expiry',{method:'POST',headers:{'x-api-key':process.env.CALADDIN_API_KEY}}).then(r=>r.text().then(t=>{if(!r.ok)throw new Error(r.status+' '+t);console.log(t)})).catch(e=>{console.error(e);process.exit(1)})"
    envVars:
      - fromGroup: caladdin-core

  # Booking reminder emails — hourly
  - type: cron
    name: caladdin-reminders
    runtime: node
    plan: starter
    region: oregon
    schedule: "0 * * * *"
    buildCommand: npm ci
    startCommand: >-
      node -e "fetch(process.env.CALADDIN_BASE_URL+'/jobs/reminders',{method:'POST',headers:{'x-api-key':process.env.CALADDIN_API_KEY}}).then(r=>r.text().then(t=>{if(!r.ok)throw new Error(r.status+' '+t);console.log(t)})).catch(e=>{console.error(e);process.exit(1)})"
    envVars:
      - fromGroup: caladdin-core
